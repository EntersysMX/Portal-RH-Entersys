# ============================================
# Frappe HR - Docker Compose
# Levanta una instancia completa de Frappe HR
# con ERPNext para conectar via REST API (HRMS deshabilitado)
# ============================================
# Uso:
#   docker compose up -d
#   ./setup-frappe.sh    (primera vez)
#
# Acceso:
#   Frappe HR: http://localhost:8080
#   Login: administrator / admin
#   API: http://localhost:8080/api/resource/Employee
# ============================================

services:
  mariadb:
    image: mariadb:10.11
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: "123"
    volumes:
      - mariadb-data:/var/lib/mysql
    ports:
      - "3307:3306"
    restart: unless-stopped
    healthcheck:
      test: mysqladmin ping -h localhost --password=123
      interval: 5s
      retries: 10

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped

  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    image: frappe/erpnext:v15
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    environment:
      - FRAPPE_SITE_NAME_HEADER=hr.localhost
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    restart: unless-stopped

  websocket:
    image: frappe/erpnext:v15
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]
    depends_on:
      - backend
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    restart: unless-stopped

  queue-short:
    image: frappe/erpnext:v15
    command: ["bench", "worker", "--queue", "short,default"]
    depends_on:
      - backend
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    restart: unless-stopped

  scheduler:
    image: frappe/erpnext:v15
    command: ["bench", "schedule"]
    depends_on:
      - backend
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    restart: unless-stopped

  frontend:
    image: frappe/erpnext:v15
    command: ["nginx-entrypoint.sh"]
    depends_on:
      - backend
      - websocket
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: hr.localhost
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 50m
    ports:
      - "8080:8080"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    restart: unless-stopped

volumes:
  mariadb-data:
  sites:
  logs:
